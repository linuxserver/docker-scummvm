---

# jenkins variables
project_name: docker-scummvm
external_type: github_stable
external_artifact_check: |
  if curl -IfSsL "https://downloads.scummvm.org/frs/scummvm/$(echo ${EXT_RELEASE}| sed 's/^v//g')/scummvm_$(echo ${EXT_RELEASE}| sed 's/^v//g')-1_ubuntu24_04_amd64.deb" > /dev/null 2>&1; then
    artifacts_found="true"
  else
    artifacts_found="false"
  fi
release_type: stable
release_tag: latest
ls_branch: master
build_armhf: false
repo_vars:
  - EXT_USER = 'scummvm'
  - EXT_REPO = 'scummvm'
  - BUILD_VERSION_ARG = 'SCUMMVM_VERSION'
  - LS_USER = 'linuxserver'
  - LS_REPO = 'docker-scummvm'
  - CONTAINER_NAME = 'scummvm'
  - DOCKERHUB_IMAGE = 'linuxserver/scummvm'
  - DEV_DOCKERHUB_IMAGE = 'lsiodev/scummvm'
  - PR_DOCKERHUB_IMAGE = 'lspipepr/scummvm'
  - DIST_IMAGE = 'debian'
  - MULTIARCH = 'false'
  - CI = 'true'
  - CI_WEB = 'true'
  - CI_PORT = '3001'
  - CI_SSL = 'true'
  - CI_DELAY = '120'
  - CI_DOCKERENV = 'TZ=US/Pacific'
  - CI_AUTH = 'user:password'
  - CI_WEBPATH = ''
